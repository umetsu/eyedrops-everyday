<svg viewBox="0 0 1024 500" width="1024" height="500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>毎日目薬 フィーチャーグラフィック</title>
  <desc>深緑の背景に、アプリ名「毎日目薬」とキャッチコピー、点眼カレンダー画面のスマートフォンモックアップを配置したGoogle Play用バナー</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B5E20"/>
      <stop offset="0.55" stop-color="#2E7D32"/>
      <stop offset="1" stop-color="#388E3C"/>
    </linearGradient>
    <clipPath id="phoneClip">
      <rect x="630" y="58" width="324" height="384" rx="32"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <style>
      .ja { font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <!-- decorative translucent circles -->
  <circle cx="60" cy="470" r="200" fill="#ffffff" opacity="0.05"/>
  <circle cx="980" cy="40" r="150" fill="#ffffff" opacity="0.06"/>
  <circle cx="540" cy="250" r="320" fill="#ffffff" opacity="0.03"/>

  <!-- eyedrop accent -->
  <g transform="translate(78,92)">
    <path d="M22 0 C22 0 44 30 44 44 A22 22 0 1 1 0 44 C0 30 22 0 22 0 Z" fill="#A5D6A7"/>
    <ellipse cx="15" cy="40" rx="7" ry="10" fill="#ffffff" opacity="0.55"/>
  </g>

  <!-- left text block -->
  <text class="ja" x="72" y="225" font-size="90" font-weight="700" fill="#ffffff" letter-spacing="2">毎日目薬</text>
  <text class="ja" x="76" y="285" font-size="34" font-weight="500" fill="#E8F5E9">毎日の点眼を、忘れない。</text>

  <!-- feature pills -->
  <g class="ja" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">
    <rect x="76"  y="318" width="156" height="42" rx="21" fill="#ffffff" opacity="0.18"/>
    <text x="154" y="345" fill="#ffffff">カレンダー記録</text>
    <rect x="244" y="318" width="174" height="42" rx="21" fill="#ffffff" opacity="0.18"/>
    <text x="331" y="345" fill="#ffffff">リマインダー通知</text>
    <rect x="430" y="318" width="128" height="42" rx="21" fill="#ffffff" opacity="0.18"/>
    <text x="494" y="345" fill="#ffffff">眼圧グラフ</text>
  </g>

  <!-- phone mockup -->
  <g filter="url(#shadow)">
    <rect x="630" y="58" width="324" height="384" rx="32" fill="#ffffff"/>
  </g>
  <g clip-path="url(#phoneClip)">
    <rect x="630" y="58" width="324" height="384" fill="#ffffff"/>
    <!-- header -->
    <rect x="630" y="58" width="324" height="58" fill="#2E7D32"/>
    <text class="ja" x="792" y="95" font-size="21" font-weight="700" fill="#ffffff" text-anchor="middle">点眼履歴</text>
    <circle cx="928" cy="87" r="3" fill="#ffffff"/><circle cx="936" cy="87" r="3" fill="#ffffff"/>

    <!-- calendar card -->
    <rect x="648" y="134" width="288" height="232" rx="16" fill="#EEF3EC"/>
    <text class="ja" x="792" y="166" font-size="16" font-weight="700" fill="#37474F" text-anchor="middle">2026年6月</text>
    <text class="ja" x="672" y="167" font-size="16" fill="#90A4AE">‹</text>
    <text class="ja" x="912" y="167" font-size="16" fill="#90A4AE">›</text>

    <!-- weekday headers -->
    <g class="ja" font-size="12" text-anchor="middle">
      <text x="670" y="192" fill="#E53935">日</text>
      <text x="708" y="192" fill="#666666">月</text>
      <text x="746" y="192" fill="#666666">火</text>
      <text x="784" y="192" fill="#666666">水</text>
      <text x="822" y="192" fill="#666666">木</text>
      <text x="860" y="192" fill="#666666">金</text>
      <text x="898" y="192" fill="#2196F3">土</text>
    </g>

    <!-- date rows -->
    <g class="ja" font-size="13" text-anchor="middle" fill="#455A64">
      <!-- row1 1-7 -->
      <text x="670" y="222">1</text><text x="708" y="222">2</text><text x="746" y="222">3</text><text x="784" y="222">4</text><text x="822" y="222">5</text><text x="860" y="222">6</text><text x="898" y="222">7</text>
      <!-- row2 8-14 -->
      <text x="670" y="256">8</text><text x="708" y="256">9</text><text x="746" y="256">10</text><text x="784" y="256">11</text><text x="822" y="256">12</text><text x="860" y="256">13</text><text x="898" y="256">14</text>
      <!-- row3 15-21 -->
      <text x="670" y="290">15</text><text x="708" y="290">16</text><text x="746" y="290">17</text><text x="784" y="290">18</text><text x="822" y="290">19</text><text x="860" y="290">20</text><text x="898" y="290">21</text>
      <!-- row4 22-28 -->
      <text x="670" y="328">22</text><text x="708" y="328">23</text><text x="746" y="328">24</text><text x="784" y="328">25</text><text x="822" y="328">26</text>
      <text x="898" y="328">28</text>
    </g>
    <!-- completed dots under 24,25,26 -->
    <circle cx="746" cy="338" r="3" fill="#4CAF50"/>
    <circle cx="784" cy="338" r="3" fill="#4CAF50"/>
    <circle cx="822" cy="338" r="3" fill="#4CAF50"/>
    <!-- today 27 highlighted -->
    <circle cx="860" cy="324" r="16" fill="#2E7D32"/>
    <text class="ja" x="860" y="329" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">27</text>

    <!-- FAB -->
    <circle cx="900" cy="398" r="24" fill="#2E7D32"/>
    <path d="M888 398 L896 406 L912 389" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
